aws:
  dynamodb:
    region: ${REGION}
    access-key: ${DYNAMO_ACCESS}
    secret-key: ${DYNAMO_SECRET}

server:
  port: 8080

logging:
  level:
    root: info

jwt:
  secret:
    key: ${JWT_SECRET}
    expiration:
      access-token: ${ACCESS_EXPIRATION}
      refresh-token: ${REFRESH_EXPIRATION}

vworld:
  api:
    key: ${VWORLD_KEY}

its:
  api:
    key: ${ITS_KEY}